<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ワークアウト・ストレッチタイマー v8.0</title>
<style>
body{font-family:'Helvetica Neue',Arial,sans-serif;background-color:#f4f6f9;color:#333;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;padding:10px;box-sizing:border-box;}
.container{background:white;padding:20px;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.05);width:100%;max-width:640px;box-sizing:border-box;}
h1{font-size:1.3rem;text-align:center;margin-bottom:15px;color:#2c3e50;}
.bgm-control-panel {background:#f8fafc;padding:10px 15px;border-radius:8px;border:1px solid #e2e8f0;margin-bottom:15px;display:flex;align-items:center;gap:10px;font-size:0.9rem;color:#4a5568;}
.bgm-control-panel input[type="checkbox"] {width:18px;height:18px;cursor:pointer;}
.status-display{background:#edf2f7;padding:15px;border-radius:8px;text-align:center;margin-bottom:20px;}
.status-main{font-size:1.1rem;font-weight:bold;color:#4a5568;margin-bottom:8px;}
.progress-container{background-color:#e2e8f0;border-radius:4px;height:10px;width:100%;overflow:hidden;}
.progress-bar{background-color:#3182ce;height:100%;width:0%;transition:width 0.1s linear;}

.setting-row{display:flex;flex-direction:row;align-items:center;justify-content:between;margin-bottom:12px;padding:10px;border-radius:6px;transition:background 0.2s;border:1px solid transparent;gap:10px;box-sizing:border-box;}
.setting-row.active{background:#ebf8ff;border-color:#bee3f8;}
.left-group{display:flex;align-items:center;gap:8px;flex:1;min-width:110px;}
.right-group{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
.setting-row input[type="checkbox"]{width:18px;height:18px;cursor:pointer;flex-shrink:0;}
.setting-name-input{font-size:0.9rem;font-weight:bold;color:#4a5568;border:1px solid transparent;background:transparent;padding:4px 6px;border-radius:4px;width:100%;max-width:110px;transition:all 0.2s;}
.setting-name-input:hover{background:#edf2f7;border-color:#cbd5e0;}
.setting-name-input:focus{background:white;border-color:#3182ce;outline:none;box-shadow:0 0 0 3px rgba(66,153,225,0.2);}
.input-group{display:flex;align-items:center;gap:2px;font-size:0.8rem;white-space:nowrap;color:#4a5568;}
input[type="number"]{width:42px;padding:6px 4px;border:1px solid #cbd5e0;border-radius:4px;text-align:center;font-size:0.9rem;}

/* 新機能用の色付け */
.advanced-badge{font-size:0.7rem;background:#9f7aea;color:white;padding:2px 5px;border-radius:4px;margin-left:4px;font-weight:normal;}
.current-active-param{background-color:#feebc8 !important;border-color:#fbd38d !important;font-weight:bold;}

.controls{display:flex;gap:10px;margin-top:25px;}
button{flex:1;padding:12px;border:none;border-radius:6px;font-size:1rem;font-weight:bold;cursor:pointer;transition:all 0.2s;}
.btn-start{background-color:#48bb78;color:white;}
.btn-start:hover{background-color:#38a169;}
.btn-pause{background-color:#ecc94b;color:white;display:none;}
.btn-pause:hover{background-color:#d69e2e;}
.btn-resume{background-color:#4299e1;color:white;display:none;}
.btn-resume:hover{background-color:#3182ce;}
.btn-stop{background-color:#f56565;color:white;display:none;}
.btn-stop:hover{background-color:#e53e3e;}
button:disabled{background-color:#cbd5e0;cursor:not-allowed;}

@media (max-width: 580px) {
  .setting-row { flex-direction: column; align-items: flex-start; gap: 8px; }
  .left-group { width: 100%; }
  .setting-name-input { max-width: none; flex: 1; }
  .right-group { width: 100%; justify-content: flex-start; padding-left: 26px; box-sizing: border-box; }
}
</style>
</head>
<body>
<div class="container">
<h1>Stretch & Workout Timer</h1>

<div class="bgm-control-panel">
  <input type="checkbox" id="bgmSwitch" checked onchange="toggleBgmPlayState()">
  <label id="bgmLabel" for="bgmSwitch" style="cursor:pointer; user-select:none;">🎵 BGMを流す（音量：極小）</label>
</div>

<div class="status-display">
<div id="status" class="status-main">設定を選んでスタートしてください</div>
<div class="progress-container"><div id="progressBar" class="progress-bar"></div></div>
</div>

<div id="settings-container"></div>

<div class="controls">
<button id="startBtn" class="btn-start" onclick="startTimer()">スタート</button>
<button id="pauseBtn" class="btn-pause" onclick="pauseTimer()">一時停止</button>
<button id="resumeBtn" class="btn-resume" onclick="resumeTimer()">再開</button>
<button id="stopBtn" class="btn-stop" onclick="stopTimer()">ストップ</button>
</div>
</div>

<audio id="bgmAudio" loop src="bgm.mp3" preload="auto"></audio>

<script>
const STORAGE_KEY='workout_timer_settings_v8';
let currentRowIndex=-1;
let mainLoopTimeout=null;
let progressInterval=null;
let audioCtx=null;
const updateSpeed=100;
let lastCountedSecond=0;

// タイマー進行用の詳細ステータス
let isAdvancedMode=false;
let currentSet=1, totalSets=1;
let currentCount=1, totalCounts=1;
let currentRemainingTime=0, currentTotalTime=0;
let advancedPhase=''; // 'WORK'（動作秒数） または 'INTERVAL'（セット間休み）
let simplePhase='A';  // 'A' または 'B'

const bgm=document.getElementById('bgmAudio');
const bgmSwitch=document.getElementById('bgmSwitch');
bgm.volume=0.02; 

// 初期設定（1,2は従来型、3,4は新型セット対応）
const defaultSettings=[
  {type:'simple',checked:true,name:'設定 1',count:10,intA:3,intB:2},
  {type:'simple',checked:false,name:'設定 2',count:5,intA:5,intB:5},
  {type:'advanced',checked:false,name:'改造設定 3',sets:5,count:20,workSec:2,intSec:20},
  {type:'advanced',checked:false,name:'改造設定 4',sets:3,count:10,workSec:3,intSec:15}
];

let currentSettings=JSON.parse(localStorage.getItem(STORAGE_KEY))||defaultSettings;
const container=document.getElementById('settings-container');

// 画面に4つの設定行を生成
for(let i=0; i<4; i++){
  const item=currentSettings[i]||defaultSettings[i];
  const row=document.createElement('div');
  row.className=`setting-row ${item.checked?'active':''}`;
  row.id=`row-${i}`;
  
  if(item.type === 'simple'){
    // 従来型（設定1、2）
    row.innerHTML=`
      <div class="left-group">
        <input type="checkbox" id="chk-${i}" ${item.checked?'checked':''} onchange="handleCheckboxChange(${i})">
        <input type="text" id="name-${i}" class="setting-name-input" value="${item.name}" oninput="saveAllSettings()">
      </div>
      <div class="right-group">
        <div class="input-group"><input type="number" id="count-${i}" value="${item.count}" min="1" oninput="saveAllSettings()"> 回</div>
        <div class="input-group"><input type="number" id="intA-${i}" value="${item.intA}" min="1" oninput="saveAllSettings()"> 秒(A)</div>
        <div class="input-group"><input type="number" id="intB-${i}" value="${item.intB}" min="1" oninput="saveAllSettings()"> 秒(B)</div>
      </div>`;
  } else {
    // 改造新型（設定3、4）
    row.innerHTML=`
      <div class="left-group">
        <input type="checkbox" id="chk-${i}" ${item.checked?'checked':''} onchange="handleCheckboxChange(${i})">
        <div style="display:flex; flex-direction:column;">
          <input type="text" id="name-${i}" class="setting-name-input" value="${item.name}" oninput="saveAllSettings()">
          <span class="advanced-badge">セット型</span>
        </div>
      </div>
      <div class="right-group">
        <div class="input-group"><input type="number" id="sets-${i}" value="${item.sets}" min="1" oninput="saveAllSettings()"> ｾｯﾄ</div>
        <div class="input-group"><input type="number" id="count-${i}" value="${item.count}" min="1" oninput="saveAllSettings()"> 回</div>
        <div class="input-group"><input type="number" id="workSec-${i}" value="${item.workSec}" min="1" oninput="saveAllSettings()"> 秒毎</div>
        <div class="input-group"><input type="number" id="intSec-${i}" value="${item.intSec}" min="0" oninput="saveAllSettings()"> ｲﾝﾀｰﾊﾞﾙ</div>
      </div>`;
  }
  container.appendChild(row);
}

function saveAllSettings(){
  const settingsToSave=[];
  for(let i=0; i<4; i++){
    const isSimple = (i < 2);
    if(isSimple){
      settingsToSave.push({
        type:'simple', checked:document.getElementById(`chk-${i}`).checked, name:document.getElementById(`name-${i}`).value,
        count:parseInt(document.getElementById(`count-${i}`).value)||1, intA:parseFloat(document.getElementById(`intA-${i}`).value)||1, intB:parseFloat(document.getElementById(`intB-${i}`).value)||1
      });
    } else {
      settingsToSave.push({
        type:'advanced', checked:document.getElementById(`chk-${i}`).checked, name:document.getElementById(`name-${i}`).value,
        sets:parseInt(document.getElementById(`sets-${i}`).value)||1, count:parseInt(document.getElementById(`count-${i}`).value)||1,
        workSec:parseFloat(document.getElementById(`workSec-${i}`).value)||1, intSec:parseFloat(document.getElementById(`intSec-${i}`).value)||0
      });
    }
  }
  localStorage.setItem(STORAGE_KEY,JSON.stringify(settingsToSave));
}

/* 音響システム（独立管理・大音量） */
function playBeep(freq,duration,type="sine"){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') audioCtx.resume();
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.type=type;
  osc.frequency.setValueAtTime(freq,audioCtx.currentTime);
  gain.gain.setValueAtTime(0.6,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime+duration);
}
function playASound(){playBeep(660,0.15);}
function playBSound(){playBeep(440,0.3,"triangle");} 
function playCountdownSound(){playBeep(880,0.08);}
function playSetFinishSound(){playBeep(587.33,0.2); setTimeout(()=>playBeep(698.46,0.2),150); setTimeout(()=>playBeep(880,0.4),300);} // ファンファーレ風
function playFinishAlarm(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') audioCtx.resume();
  const now=audioCtx.currentTime;
  for(let i=0;i<4;i++){
    const startTime=now+(i*0.15);
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.type='sine';
    osc.frequency.setValueAtTime(1000,startTime);
    gain.gain.setValueAtTime(0.6,startTime);
    gain.gain.exponentialRampToValueAtTime(0.001,startTime+0.12);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(startTime);
    osc.stop(startTime+0.15);
  }
}

function handleCheckboxChange(selectedIndex){
  for(let i=0; i<4; i++){
    if(i!==selectedIndex){
      document.getElementById(`chk-${i}`).checked=false;
      document.getElementById(`row-${i}`).classList.remove('active');
    }else if(document.getElementById(`chk-${i}`).checked){
      document.getElementById(`row-${i}`).classList.add('active');
    }else{
      document.getElementById(`row-${i}`).classList.remove('active');
    }
  }
  saveAllSettings();
}

function toggleInputs(disabled){
  for(let i=0; i<4; i++){
    document.getElementById(`chk-${i}`).disabled=disabled;
    document.getElementById(`name-${i}`).disabled=disabled;
    document.getElementById(`count-${i}`).disabled=disabled;
    if(i<2){
      document.getElementById(`intA-${i}`).disabled=disabled;
      document.getElementById(`intB-${i}`).disabled=disabled;
    } else {
      document.getElementById(`sets-${i}`).disabled=disabled;
      document.getElementById(`workSec-${i}`).disabled=disabled;
      document.getElementById(`intSec-${i}`).disabled=disabled;
    }
  }
  document.getElementById('bgmSwitch').disabled=disabled;
}

function toggleBgmPlayState(){
  if(!bgmSwitch.checked){ bgm.pause(); }
  else {
    if(document.getElementById('startBtn').style.display==='none' && document.getElementById('resumeBtn').style.display==='none'){
      try{bgm.play();}catch(e){}
    }
  }
}

/* タイマー開始ロジック */
function startTimer(){
  currentRowIndex=-1;
  for(let i=0; i<4; i++){
    if(document.getElementById(`chk-${i}`).checked){ currentRowIndex=i; break; }
  }
  if(currentRowIndex===-1){alert('動かしたい設定のチェックボックスにチェックを入れてください。');return;}

  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') audioCtx.resume();

  toggleInputs(true);
  document.getElementById('startBtn').style.display='none';
  document.getElementById('pauseBtn').style.display='block';
  document.getElementById('stopBtn').style.display='block';

  if(bgmSwitch.checked){try{bgm.currentTime=0;bgm.play();}catch(e){}}

  // モード判定
  if(currentRowIndex < 2) {
    // 従来モード
    isAdvancedMode = false;
    totalCounts = parseInt(document.getElementById(`count-${currentRowIndex}`).value)||1;
    currentCount = totalCounts; 
    simplePhase = 'A';
    runSimpleNext();
  } else {
    // 改造セットモード
    isAdvancedMode = true;
    totalSets = parseInt(document.getElementById(`sets-${currentRowIndex}`).value)||1;
    totalCounts = parseInt(document.getElementById(`count-${currentRowIndex}`).value)||1;
    currentSet = 1;
    currentCount = 1;
    advancedPhase = 'WORK';
    runAdvancedNext();
  }
}

/* ＝メインループ：従来型（設定1, 2）＝ */
function runSimpleNext(){
  if(currentCount<=0){ finishTimer(); return; }
  const inputA=document.getElementById(`intA-${currentRowIndex}`);
  const inputB=document.getElementById(`intB-${currentRowIndex}`);
  let seconds=0;
  
  if(simplePhase==='A'){
    seconds=parseFloat(inputA.value);
    inputA.classList.add('current-active-param');
    inputB.classList.remove('current-active-param');
    playASound();
  }else{
    seconds=parseFloat(inputB.value);
    inputB.classList.add('current-active-param');
    inputA.classList.remove('current-active-param');
    playBSound();
  }
  
  currentTotalTime=seconds*1000;
  currentRemainingTime=currentTotalTime;
  lastCountedSecond=Math.ceil(seconds);
  updateDisplay();
  startProgressLoop();
  
  mainLoopTimeout=setTimeout(()=>{
    stopProgressLoop();
    if(simplePhase==='A'){
      simplePhase='B';
    }else{
      simplePhase='A';
      currentCount--;
    }
    runSimpleNext();
  },currentTotalTime);
}

/* ＝メインループ：改造セット型（設定3, 4）＝ */
function runAdvancedNext(){
  // 全セット終了
  if(currentSet > totalSets){ finishTimer(); return; }
  
  const inputSets=document.getElementById(`sets-${currentRowIndex}`);
  const inputCount=document.getElementById(`count-${currentRowIndex}`);
  const inputWork=document.getElementById(`workSec-${currentRowIndex}`);
  const inputInt=document.getElementById(`intSec-${currentRowIndex}`);
  
  // ハイライトのリセット
  inputSets.classList.remove('current-active-param');
  inputCount.classList.remove('current-active-param');
  inputWork.classList.remove('current-active-param');
  inputInt.classList.remove('current-active-param');
  
  let seconds = 0;
  
  if(advancedPhase === 'WORK') {
    // 動作中（○秒毎）
    inputCount.classList.add('current-active-param');
    inputWork.classList.add('current-active-param');
    seconds = parseFloat(inputWork.value);
    playASound(); // 1回ごとの開始音
  } else {
    // セット間インターバル
    inputSets.classList.add('current-active-param');
    inputInt.classList.add('current-active-param');
    seconds = parseFloat(inputInt.value);
    playSetFinishSound(); // セット終了の特別アラーム
  }
  
  currentTotalTime=seconds*1000;
  currentRemainingTime=currentTotalTime;
  lastCountedSecond=Math.ceil(seconds);
  updateDisplay();
  startProgressLoop();
  
  mainLoopTimeout=setTimeout(()=>{
    stopProgressLoop();
    
    if(advancedPhase === 'WORK') {
      if(currentCount < totalCounts) {
        // 同じセット内で次の回数へ
        currentCount++;
        runAdvancedNext();
      } else {
        // 指定回数に達した
        if(currentSet < totalSets) {
          // まだ次のセットがある場合はインターバルへ
          advancedPhase = 'INTERVAL';
          runAdvancedNext();
        } else {
          // 最終セットの最終回が終わったら終了
          currentSet++;
          runAdvancedNext();
        }
      }
    } else {
      // インターバル終了。次のセットの1回目へ
      currentSet++;
      currentCount = 1;
      advancedPhase = 'WORK';
      runAdvancedNext();
    }
  }, currentTotalTime);
}

/* 進捗バーとカウントダウン音 */
function startProgressLoop(){
  stopProgressLoop();
  progressInterval=setInterval(()=>{
    currentRemainingTime-=updateSpeed;
    if(currentRemainingTime<0)currentRemainingTime=0;
    const currentSecond=Math.ceil(currentRemainingTime/1000);
    if(currentSecond>0&&currentSecond<=3&&currentSecond!==lastCountedSecond){
      playCountdownSound();
      lastCountedSecond=currentSecond;
    }
    updateDisplay();
  },updateSpeed);
}
function stopProgressLoop(){clearInterval(progressInterval);}

/* 画面表示の更新 */
function updateDisplay(){
  const status=document.getElementById('status');
  const progressBar=document.getElementById('progressBar');
  const displaySec=(currentRemainingTime/1000).toFixed(1);
  const currentName=document.getElementById(`name-${currentRowIndex}`).value||`設定 ${currentRowIndex+1}`;
  
  if(!isAdvancedMode) {
    // 従来表示
    status.innerHTML=`<span style="font-size:0.9rem; color:#718096; display:block;">${currentName}を実行中</span>残り: <span style="color:#3182ce; font-size:1.4rem;">${currentCount}</span> 回 ── <span style="color:#e53e3e;">間隔${simplePhase}</span> (${displaySec}秒)`;
  } else {
    // 改造セット表示
    if(advancedPhase === 'WORK') {
      status.innerHTML=`<span style="font-size:0.9rem; color:#6b46c1; display:block; font-weight:bold;">${currentName} (セット進行中)</span><span style="color:#3182ce; font-size:1.3rem;">${currentSet}</span>/${totalSets} ｾｯﾄ目 ── <span style="color:#3182ce; font-size:1.3rem;">${currentCount}</span>/${totalCounts} 回目 (${displaySec}秒)`;
    } else {
      status.innerHTML=`<span style="font-size:0.9rem; color:#b7791f; display:block; font-weight:bold;">${currentName} (セット間休憩)</span>🍵 インターバル中... 次は ${currentSet+1} セット目<br><span style="color:#e53e3e; font-size:1.4rem;">残り ${displaySec} 秒</span>`;
    }
  }
  const progressPercent=((currentTotalTime-currentRemainingTime)/currentTotalTime)*100;
  progressBar.style.width=`${progressPercent}%`;
}

/* 一時停止・再開・ストップ */
function pauseTimer(){
  clearTimeout(mainLoopTimeout);
  stopProgressLoop();
  bgm.pause();
  document.getElementById('pauseBtn').style.display='none';
  document.getElementById('resumeBtn').style.display='block';
  const currentName=document.getElementById(`name-${currentRowIndex}`).value||`設定 ${currentRowIndex+1}`;
  document.getElementById('status').innerHTML=`<span style="font-size:0.9rem; color:#718096; display:block;">${currentName}</span>⏸ 一時停止中`;
}
function resumeTimer(){
  document.getElementById('resumeBtn').style.display='none';
  document.getElementById('pauseBtn').style.display='block';
  if(bgmSwitch.checked){bgm.play();}
  updateDisplay();
  startProgressLoop();
  
  mainLoopTimeout=setTimeout(()=>{
    stopProgressLoop();
    if(!isAdvancedMode) {
      if(simplePhase==='A'){ simplePhase='B'; }else{ simplePhase='A'; currentCount--; }
      runSimpleNext();
    } else {
      if(advancedPhase === 'WORK') {
        if(currentCount < totalCounts) { currentCount++; } 
        else { if(currentSet < totalSets) { advancedPhase = 'INTERVAL'; } else { currentSet++; } }
      } else {
        currentSet++; currentCount = 1; advancedPhase = 'WORK';
      }
      runAdvancedNext();
    }
  },currentRemainingTime);
}

function finishTimer(){cleanup();playFinishAlarm();document.getElementById('status').innerHTML='✨ 全メニュー終了！素晴らしいです！ ✨';resetButtons();}
function stopTimer(){cleanup();document.getElementById('status').innerHTML='設定を選んでスタートしてください';resetButtons();}
function cleanup(){
  clearTimeout(mainLoopTimeout);
  stopProgressLoop();
  bgm.pause();
  bgm.currentTime=0;
  document.getElementById('progressBar').style.width='0%';
  for(let i=0; i<4; i++){
    document.getElementById(`count-${i}`).classList.remove('current-active-param');
    if(i<2){
      document.getElementById(`intA-${i}`).classList.remove('current-active-param');
      document.getElementById(`intB-${i}`).classList.remove('current-active-param');
    } else {
      document.getElementById(`sets-${i}`).classList.remove('current-active-param');
      document.getElementById(`workSec-${i}`).classList.remove('current-active-param');
      document.getElementById(`intSec-${i}`).classList.remove('current-active-param');
    }
  }
}
function resetButtons(){toggleInputs(false);document.getElementById('startBtn').style.display='block';document.getElementById('pauseBtn').style.display='none';document.getElementById('resumeBtn').style.display='none';document.getElementById('stopBtn').style.display='none';}
</script>
</body>
</html>
