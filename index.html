<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ワークアウト・ストレッチタイマー v4</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 580px;
        }
        h1 {
            font-size: 1.4rem;
            text-align: center;
            margin-bottom: 25px;
            color: #2c3e50;
        }
        .status-display {
            background: #edf2f7;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }
        .status-main {
            font-size: 1.2rem;
            font-weight: bold;
            color: #4a5568;
            margin-bottom: 8px;
        }
        .progress-container {
            background-color: #e2e8f0;
            border-radius: 4px;
            height: 10px;
            width: 100%;
            overflow: hidden;
        }
        .progress-bar {
            background-color: #3182ce;
            height: 100%;
            width: 0%;
            transition: width 0.1s linear;
        }
        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 6px;
            transition: background 0.2s;
            border: 1px solid transparent;
        }
        .setting-row.active {
            background: #ebf8ff;
            border-color: #bee3f8;
        }
        .left-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }
        .right-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .setting-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .setting-name-input {
            font-size: 0.95rem;
            font-weight: bold;
            color: #4a5568;
            border: 1px solid transparent;
            background: transparent;
            padding: 4px 6px;
            border-radius: 4px;
            width: 140px;
            transition: all 0.2s;
        }
        .setting-name-input:hover {
            background: #edf2f7;
            border-color: #cbd5e0;
        }
        .setting-name-input:focus {
            background: white;
            border-color: #3182ce;
            outline: none;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.2);
        }
        .input-group {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.9rem;
        }
        input[type="number"] {
            width: 50px;
            padding: 6px;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            text-align: center;
            font-size: 0.95rem;
        }
        .current-interval {
            background-color: #feebc8 !important;
            border-color: #fbd38d !important;
            font-weight: bold;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-start { background-color: #48bb78; color: white; }
        .btn-start:hover { background-color: #38a169; }
        .btn-pause { background-color: #ecc94b; color: white; display: none; }
        .btn-pause:hover { background-color: #d69e2e; }
        .btn-resume { background-color: #4299e1; color: white; display: none; }
        .btn-resume:hover { background-color: #3182ce; }
        .btn-stop { background-color: #f56565; color: white; display: none; }
        .btn-stop:hover { background-color: #e53e3e; }
        button:disabled { background-color: #cbd5e0; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h1>Stretch & Workout Timer</h1>
    
    <div class="status-display">
        <div id="status" class="status-main">設定を選んでスタートしてください</div>
        <div class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
        </div>
    </div>

    <!-- 設定行（5個） -->
    <div id="settings-container"></div>

    <!-- コントロールボタン -->
    <div class="controls">
        <button id="startBtn" class="btn-start" onclick="startTimer()">スタート</button>
        <button id="pauseBtn" class="btn-pause" onclick="pauseTimer()">一時停止</button>
        <button id="resumeBtn" class="btn-resume" onclick="resumeTimer()">再開</button>
        <button id="stopBtn" class="btn-stop" onclick="stopTimer()">ストップ</button>
    </div>
</div>

<script>
    const totalSettings = 5;
    const STORAGE_KEY = 'workout_timer_settings_v4';
    
    let currentRowIndex = -1;
    let remainingCounts = 0;
    
    let mainLoopTimeout = null;
    let progressInterval = null;
    let audioCtx = null;

    let currentIntervalType = 'A';
    let currentTotalTime = 0;
    let currentRemainingTime = 0;
    const updateSpeed = 100;

    const defaultSettings = [
        { checked: true,  name: '設定 1', count: 10, intA: 3, intB: 2 },
        { checked: false, name: '設定 2', count: 5,  intA: 5, intB: 5 },
        { checked: false, name: '設定 3', count: 8,  intA: 4, intB: 3 },
        { checked: false, name: '設定 4', count: 12, intA: 2, intB: 2 },
        { checked: false, name: '設定 5', count: 15, intA: 3, intB: 1 }
    ];

    let currentSettings = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultSettings;

    const container = document.getElementById('settings-container');
    for (let i = 0; i < totalSettings; i++) {
        const item = currentSettings[i] || defaultSettings[i];
        const row = document.createElement('div');
        row.className = `setting-row ${item.checked ? 'active' : ''}`;
        row.id = `row-${i}`;
        row.innerHTML = `
            <div class="left-group">
                <input type="checkbox" id="chk-${i}" ${item.checked ? 'checked' : ''} onchange="handleCheckboxChange(${i})">
                <input type="text" id="name-${i}" class="setting-name-input" value="${item.name}" oninput="saveAllSettings()" placeholder="設定名入力">
            </div>
            <div class="right-group">
                <div class="input-group">
                    <input type="number" id="count-${i}" value="${item.count}" min="1" oninput="saveAllSettings()"> 回
                </div>
                <div class="input-group">
                    <input type="number" id="intA-${i}" value="${item.intA}" min="1" oninput="saveAllSettings()"> 秒(A)
                </div>
                <div class="input-group">
                    <input type="number" id="intB-${i}" value="${item.intB}" min="1" oninput="saveAllSettings()"> 秒(B)
                </div>
            </div>
        `;
        container.appendChild(row);
    }

    function saveAllSettings() {
        const settingsToSave = [];
        for (let i = 0; i < totalSettings; i++) {
            settingsToSave.push({
                checked: document.getElementById(`chk-${i}`).checked,
                name: document.getElementById(`name-${i}`).value,
                count: parseInt(document.getElementById(`count-${i}`).value) || 1,
                intA: parseFloat(document.getElementById(`intA-${i}`).value) || 1,
                intB: parseFloat(document.getElementById(`intB-${i}`).value) || 1
            });
        }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(settingsToSave));
    }

    function playBeep() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime); 
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.15);
    }

    function playFinishAlarm() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const now = audioCtx.currentTime;
        
        for (let i = 0; i < 5; i++) {
            const startTime = now + (i * 0.15);
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(i === 4 ? 1000 : 880, startTime);
            
            gain.gain.setValueAtTime(0.1, startTime);
            gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.12);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(startTime);
            osc.stop(startTime + 0.12);
        }
    }

    function handleCheckboxChange(selectedIndex) {
        for (let i = 0; i < totalSettings; i++) {
            if (i !== selectedIndex) {
                document.getElementById(`chk-${i}`).checked = false;
                document.getElementById(`row-${i}`).classList.remove('active');
            } else if (document.getElementById(`chk-${i}`).checked) {
                document.getElementById(`row-${i}`).classList.add('active');
            } else {
                document.getElementById(`row-${i}`).classList.remove('active');
            }
        }
        saveAllSettings();
    }

    function toggleInputs(disabled) {
        for (let i = 0; i < totalSettings; i++) {
            document.getElementById(`chk-${i}`).disabled = disabled;
            document.getElementById(`name-${i}`).disabled = disabled;
            document.getElementById(`count-${i}`).disabled = disabled;
            document.getElementById(`intA-${i}`).disabled = disabled;
            document.getElementById(`intB-${i}`).disabled = disabled;
        }
    }

    function startTimer() {
        currentRowIndex = -1;
        for (let i = 0; i < totalSettings; i++) {
            if (document.getElementById(`chk-${i}`).checked) {
                currentRowIndex = i;
                break;
            }
        }

        if (currentRowIndex === -1) {
            alert('動かしたい設定のチェックボックスにチェックを入れてください。');
            return;
        }

        remainingCounts = parseInt(document.getElementById(`count-${currentRowIndex}`).value);
        if (isNaN(remainingCounts) || remainingCounts <= 0) {
            alert('回数を正しく入力してください。');
            return;
        }

        toggleInputs(true);
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('pauseBtn').style.display = 'block';
        document.getElementById('stopBtn').style.display = 'block';

        currentIntervalType = 'A';
        setNextInterval();
    }

    function setNextInterval() {
        if (remainingCounts <= 0) {
            finishTimer();
            return;
        }

        const inputA = document.getElementById(`intA-${currentRowIndex}`);
        const inputB = document.getElementById(`intB-${currentRowIndex}`);

        let seconds = 0;
        if (currentIntervalType === 'A') {
            seconds = parseFloat(inputA.value);
            inputA.classList.add('current-interval');
            inputB.classList.remove('current-interval');
        } else {
            seconds = parseFloat(inputB.value);
            inputB.classList.add('current-interval');
            inputA.classList.remove('current-interval');
        }

        currentTotalTime = seconds * 1000;
        currentRemainingTime = currentTotalTime;

        playBeep();
        updateDisplay();
        startProgressLoop();

        mainLoopTimeout = setTimeout(() => {
            stopProgressLoop();
            
            if (currentIntervalType === 'A') {
                currentIntervalType = 'B';
            } else {
                currentIntervalType = 'A';
                remainingCounts--;
            }
            
            setNextInterval();
        }, currentTotalTime);
    }

    function startProgressLoop() {
        stopProgressLoop();
        progressInterval = setInterval(() => {
            currentRemainingTime -= updateSpeed;
            if (currentRemainingTime < 0) currentRemainingTime = 0;
            updateDisplay();
        }, updateSpeed);
    }

    function stopProgressLoop() {
        clearInterval(progressInterval);
    }

    function updateDisplay() {
        const status = document.getElementById('status');
        const progressBar = document.getElementById('progressBar');
        
        const displaySec = (currentRemainingTime / 1000).toFixed(1);
        const currentName = document.getElementById(`name-${currentRowIndex}`).value || `設定 ${currentRowIndex+1}`;
        status.innerHTML = `<span style="font-size:0.9rem; color:#718096; display:block;">${currentName}を実行中</span>残り: <span style="color:#3182ce; font-size:1.4rem;">${remainingCounts}</span> 回 ── <span style="color:#e53e3e;">間隔${currentIntervalType}</span> (${displaySec}秒)`;

        const progressPercent = ((currentTotalTime - currentRemainingTime) / currentTotalTime) * 100;
        progressBar.style.width = `${progressPercent}%`;
    }

    function pauseTimer() {
        clearTimeout(mainLoopTimeout);
        stopProgressLoop();
        
        document.getElementById('pauseBtn').style.display = 'none';
        document.getElementById('resumeBtn').style.display = 'block';
        const currentName = document.getElementById(`name-${currentRowIndex}`).value || `設定 ${currentRowIndex+1}`;
        document.getElementById('status').innerHTML = `<span style="font-size:0.9rem; color:#718096; display:block;">${currentName}</span>一時停止中 (残り: ${remainingCounts}回 / 間隔${currentIntervalType})`;
    }

    function resumeTimer() {
        document.getElementById('resumeBtn').style.display = 'none';
        document.getElementById('pauseBtn').style.display = 'block';

        updateDisplay();
        startProgressLoop();

        mainLoopTimeout = setTimeout(() => {
            stopProgressLoop();
            if (currentIntervalType === 'A') {
                currentIntervalType = 'B';
            } else {
                currentIntervalType = 'A';
                remainingCounts--;
            }
            setNextInterval();
        }, currentRemainingTime);
    }

    function finishTimer() {
        cleanup();
        playFinishAlarm();
        document.getElementById('status').innerHTML = '✨ 終了しました！お疲れ様です ✨';
        resetButtons();
    }

    function stopTimer() {
        cleanup();
        document.getElementById('status').innerHTML = '設定を選んでスタートしてください';
        resetButtons();
    }

    function cleanup() {
        clearTimeout(mainLoopTimeout);
        stopProgressLoop();
        document.getElementById('progressBar').style.width = '0%';
        
        if (currentRowIndex !== -1) {
            document.getElementById(`intA-${currentRowIndex}`).classList.remove('current-interval');
            document.getElementById(`intB-${currentRowIndex}`).classList.remove('current-interval');
        }
    }

    function resetButtons() {
        toggleInputs(false);
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('pauseBtn').style.display = 'none';
        document.getElementById('resumeBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'none';
    }
</script>

</body>
</html>
